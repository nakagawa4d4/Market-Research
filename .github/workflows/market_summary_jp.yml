name: 🇯🇵 日本市場 デイリーサマリー

on:
  schedule:
    # JST 19:00 = UTC 10:00 (月〜金)
    - cron: '0 10 * * 1-5'
  # 手動実行
  workflow_dispatch:

permissions:
  contents: read

jobs:
  jp-market-summary:
    name: 日本市場サマリー生成・配信
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. チェックアウト ─────────────────────────
      - name: 📥 リポジトリをチェックアウト
        uses: actions/checkout@v4

      # ── 2. Python セットアップ ─────────────────────
      - name: 🐍 Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: market_summary/requirements.txt

      # ── 3. 依存パッケージインストール ──────────────
      - name: 📦 依存パッケージをインストール
        run: |
          pip install --upgrade pip
          pip install -r market_summary/requirements.txt

      # ── 4. サマリー生成 & Discord 投稿 ─────────────
      - name: 🇯🇵 日本市場サマリー生成・投稿
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        working-directory: market_summary
        run: python main.py --mode jp

      # ── 5. 実行サマリー ────────────────────────────
      - name: 📊 実行サマリーを表示
        if: always()
        run: |
          echo "### 🇯🇵 日本市場サマリー配信" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 項目 | 値 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 実行日時 | $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST') |" >> $GITHUB_STEP_SUMMARY
          echo "| ステータス | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
